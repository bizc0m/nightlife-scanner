version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: nightlife-db
    environment:
      POSTGRES_DB: nightlife_scanner
      POSTGRES_USER: nightlife_user
      POSTGRES_PASSWORD: nightlife_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightlife_user -d nightlife_scanner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
